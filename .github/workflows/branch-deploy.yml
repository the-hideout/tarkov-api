name: branch-deploy

on:
  issue_comment:
    types: [ created ]

# Permissions needed for reacting and adding comments for IssueOps commands
permissions:
  pull-requests: write
  deployments: write
  contents: write
  checks: read
  statuses: read

jobs:
  deploy:
    environment: secrets
    if: ${{ github.event.issue.pull_request }} # only run on pull request comments
    runs-on: ubuntu-latest

    steps:
      - uses: github/branch-deploy@ddf8ca48e9cdb2d2c7c71dee428308b19af9313f # pin@v11.1.4
        id: branch-deploy
        with:
          admins: GrantBirki,Razzmatazzz
          environment_targets: production,development
          environment_urls: production|https://api.tarkov.dev/,development|https://dev-api.tarkov.dev/
          sticky_locks: "true"

      - name: checkout
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # pin@v6
        with:
          ref: ${{ steps.branch-deploy.outputs.sha }}

      - name: setup node
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # pin@v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        if: ${{ steps.branch-deploy.outputs.continue == 'true' }}
        run: npm ci

      - name: Publish - Development
        if: ${{ steps.branch-deploy.outputs.environment == 'development' &&
          steps.branch-deploy.outputs.noop != 'true' &&
          steps.branch-deploy.outputs.continue == 'true' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # pin@4.0.0
        with:
          wranglerVersion: '4'
          apiToken: ${{ secrets.CF_API_TOKEN }}
          environment: "development"

      # Post comment on PR with development deploy info
      - uses: GrantBirki/comment@3439715f0cf3b8fc29bf47be0e3226679c06c41a # pin@v3.0.0
        if: ${{ steps.branch-deploy.outputs.continue == 'true' &&
          steps.branch-deploy.outputs.noop != 'true' &&
          steps.branch-deploy.outputs.environment == 'development' }}
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### API Deployment - Development 🪐

            The API has been **deployed** to the **development** environment 🚀

            - Endpoint: `dev-api.tarkov.dev/`
            - Playground: [dev-api.tarkov.dev](https://dev-api.tarkov.dev)

            > Pusher: @${{ github.actor }}, Action: `${{ github.event_name }}`, Workflow: `${{ github.workflow }}`;

      - name: Publish - Production
        if: ${{ steps.branch-deploy.outputs.continue == 'true' &&
          steps.branch-deploy.outputs.noop != 'true' &&
          steps.branch-deploy.outputs.environment == 'production' }}
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # pin@4.0.0
        with:
          wranglerVersion: '4'
          apiToken: ${{ secrets.CF_API_TOKEN }}

      # Post comment on PR with production deploy info
      - uses: GrantBirki/comment@3439715f0cf3b8fc29bf47be0e3226679c06c41a # pin@v3.0.0
        if: ${{ steps.branch-deploy.outputs.continue == 'true' &&
          steps.branch-deploy.outputs.noop != 'true' &&
          steps.branch-deploy.outputs.environment == 'production' }}
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### API Deployment - Production 🌔

            The API has been **deployed** to the **production** environment 🚀

            - Endpoint: `api.tarkov.dev/`
            - Playground: [api.tarkov.dev](https://api.tarkov.dev)

            > Pusher: @${{ github.actor }}, Action: `${{ github.event_name }}`, Workflow: `${{ github.workflow }}`;
